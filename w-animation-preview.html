<script>
(function() {
  var SA = document.getElementById('sA'), SB = document.getElementById('sB'), SC = document.getElementById('sC');
  var G = document.getElementById('wgroup');
  [SA,SB,SC].forEach(function(s) {
    var L = s.getTotalLength();
    s.setAttribute('stroke-dasharray', L + ' ' + (2*L));
    s.dataset.len = L;
  });
  var TOTAL = 3300, DRAW = 2300;
  var f1 = 0.4491, f2 = 0.6829;

  function seg(s, k) {
    var L = parseFloat(s.dataset.len);
    s.setAttribute('stroke-dashoffset', String(k <= 0 ? L + 1 : L * (1 - Math.min(1, k))));
  }
  function render(t) {
    t = t % TOTAL;
    var k = Math.min(1, Math.max(0, t / DRAW));
    seg(SA, k / f1);
    seg(SB, (k - f1) / (f2 - f1));
    seg(SC, (k - f2) / (1 - f2));
    var w = 90;
    if (t > DRAW) w = 90 + 24 * Math.min(1, (t - DRAW) / 175);
    [SA,SB,SC].forEach(function(s){ s.setAttribute('stroke-width', String(w)); });
    var op = 1;
    if (t > TOTAL * 0.93) op = 1 - (t - TOTAL * 0.93) / (TOTAL * 0.07);
    G.setAttribute('opacity', String(op));
  }

  var qt = new URLSearchParams(location.search).get('t');
  if (qt !== null) { render(parseFloat(qt)); }
  else {
    var start = null;
    function loop(now) {
      if (start === null) start = now;
      render(now - start);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }
})();
</script>
