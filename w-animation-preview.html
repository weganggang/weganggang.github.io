    // 다 그려지면 정확한 로고로 크로스페이드
    var xf = Math.min(1, Math.max(0, (t - DRAW) / XFADE));
    F.setAttribute('opacity', String(xf));
    S.setAttribute('opacity', String(1 - xf));
    var op = 1;
    if (t > TOTAL * 0.93) op = 1 - (t - TOTAL * 0.93) / (TOTAL * 0.07);
    G.setAttribute('opacity', String(op));
  }

  var qt = new URLSearchParams(location.search).get('t');
  if (qt !== null) { render(parseFloat(qt)); }
  else {
    var start = null;
    function loop(now) {
      if (start === null) start = now;
      render(now - start);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
