<style>
  body { margin:0; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:#FFF; font-family:sans-serif; }
  .phone { width:340px; height:640px; border:2px solid #ddd; border-radius:24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; background:#FFF; }
  svg { width:260px; height:260px; }
  .caller { margin-top:8px; font-size:24px; font-weight:700; color:#1A1A2E; }
  .sub { margin-top:4px; font-size:15px; color:#555; }
  .buttons { position:absolute; bottom:40px; width:100%; display:flex;
    justify-content:space-between; padding:0 48px; box-sizing:border-box; }
  .btn { width:64px; height:64px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; color:#fff; font-size:26px; }
  .decline { background:#F44336; }
  .accept { background:#4CAF50; }
  .note { margin-top:24px; color:#888; font-size:13px; text-align:center; line-height:1.6; }

  /* v 2개 순차 드로잉: 글자를 기하적으로 두 조각으로 나눠 각각 단순 마스크로 그림 */
  #strokeA { stroke-dasharray:1; stroke-dashoffset:1; animation: drawA 3300ms linear infinite; }
  #strokeB { stroke-dasharray:1; stroke-dashoffset:1; animation: drawB 3300ms linear infinite; }
  #g1, #g2 { animation: fade 3300ms linear infinite; }
  @keyframes drawA {
    0%        { stroke-dashoffset: 1; stroke-width: 80; }
    38.17%   { stroke-dashoffset: 0; stroke-width: 80; }
    69.7%     { stroke-dashoffset: 0; stroke-width: 80; }
    75%       { stroke-dashoffset: 0; stroke-width: 110; }
    100%      { stroke-dashoffset: 0; stroke-width: 110; }
  }
  @keyframes drawB {
    0%, 38.17% { stroke-dashoffset: 1; stroke-width: 80; }
    69.7%     { stroke-dashoffset: 0; stroke-width: 80; }
    75%       { stroke-dashoffset: 0; stroke-width: 110; }
    100%      { stroke-dashoffset: 0; stroke-width: 110; }
  }
  @keyframes fade {
    0%, 93% { opacity: 1; }
    100%    { opacity: 0; }
  }
</style>
</head>
