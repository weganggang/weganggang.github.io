<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weavit W 드로잉 애니메이션 미리보기 v2</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #FFFFFF;
    font-family: sans-serif;
  }
  .phone {
    width: 340px;
    height: 640px;
    border: 2px solid #ddd;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #FFFFFF;
  }
  svg { width: 260px; height: 260px; }
  .caller {
    margin-top: 8px;
    font-size: 24px;
    font-weight: 700;
    color: #1A1A2E;
  }
  .sub { margin-top: 4px; font-size: 15px; color: #555555; }
  .buttons {
    position: absolute;
    bottom: 40px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 48px;
    box-sizing: border-box;
  }
  .btn {
    width: 64px; height: 64px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 26px;
  }
  .decline { background: #F44336; }
  .accept { background: #4CAF50; }
  .note {
    margin-top: 24px; color: #888; font-size: 13px; text-align: center;
    line-height: 1.6;
  }

  /* APK와 동일: 2300ms 그리기 → 1000ms 홀드 → 반복 (총 3300ms) */
  #wpath {
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    animation: draw 3300ms linear infinite;
  }
  @keyframes draw {
    0%     { stroke-dashoffset: 1; }
    69.7%  { stroke-dashoffset: 0; }
    100%   { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
  <div class="phone">
    <svg viewBox="0 0 512 512">
      <!-- 실제 로고 PNG를 skeletonize해서 추출한 펜 중심선 (봉우리 왕복 포함) -->
      <path id="wpath" pathLength="1"
        d="M 35,196 L 49,174 L 61,149 L 76,126 L 98,109 L 125,103 L 147,116 L 156,142 L 153,169 L 145,195 L 136,221 L 128,247 L 120,273 L 114,300 L 111,328 L 115,355 L 124,381 L 145,400 L 171,408 L 199,406 L 224,396 L 245,377 L 268,363 L 274,336 L 277,308 L 281,281 L 288,254 L 295,227 L 301,201 L 308,174 L 315,147 L 323,127 L 314,152 L 307,179 L 300,206 L 293,232 L 287,259 L 281,286 L 276,314 L 274,342 L 281,367 L 294,391 L 318,406 L 346,408 L 373,402 L 395,384 L 411,362 L 422,337 L 432,312 L 440,286 L 448,259 L 454,233 L 458,205 L 461,176 L 460,149 L 452,124"
        fill="none"
        stroke="#5B4BC4"
        stroke-width="61"
        stroke-linecap="round"
        stroke-linejoin="round"/>
    </svg>
    <div class="caller">이종빈</div>
    <div class="sub">연결 요청</div>
    <div class="buttons">
      <div class="btn decline">✕</div>
      <div class="btn accept">✓</div>
    </div>
  </div>
  <div class="note">
    v2 — 실제 로고에서 중심선 추출 (일치율 92%)<br>
    2.3초 그리기 → 1초 유지 → 반복
  </div>
</body>
</html>
