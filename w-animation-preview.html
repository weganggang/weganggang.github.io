    2.3초 그리기 → 유지 → 페이드 → 반복
  </div>
<script>
(function() {
  var A = document.getElementById('strokeA');
  var B = document.getElementById('strokeB');
  var G = document.getElementById('wgroup');
  var LA = A.getTotalLength(), LB = B.getTotalLength();
  A.setAttribute('stroke-dasharray', LA + ' ' + (2*LA));
  B.setAttribute('stroke-dasharray', LB + ' ' + (2*LB));

  var TOTAL = 3300, DRAW = 2300;
  var fA = 0.4611;
  var tA = DRAW * fA, tB = DRAW - tA;

  function render(t) {
    t = t % TOTAL;
    var a = Math.min(1, Math.max(0, t / tA));
    A.setAttribute('stroke-dashoffset', String(a === 0 ? LA + 1 : LA * (1 - a)));
    var b = Math.min(1, Math.max(0, (t - tA) / tB));
    B.setAttribute('stroke-dashoffset', String(b === 0 ? LB + 1 : LB * (1 - b)));
    var w = 80;
    if (t > DRAW) w = 80 + 26 * Math.min(1, (t - DRAW) / 175);
    A.setAttribute('stroke-width', String(w));
    B.setAttribute('stroke-width', String(w));
    var op = 1;
    if (t > TOTAL * 0.93) op = 1 - (t - TOTAL * 0.93) / (TOTAL * 0.07);
    G.setAttribute('opacity', String(op));
  }

  var qt = new URLSearchParams(location.search).get('t');
  if (qt !== null) {
    render(parseFloat(qt));
  } else {
    var start = null;
    function loop(now) {
      if (start === null) start = now;
      render(now - start);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  }
})();
</script>
