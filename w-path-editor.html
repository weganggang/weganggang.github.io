    <path id="drawn" fill="none" stroke="#5B4BC4" stroke-width="61"
      stroke-linecap="round" stroke-linejoin="round"/>
    <path id="trace" fill="none" stroke="#FF5252" stroke-width="3" stroke-dasharray="6 4"/>
  </svg>
  <div class="row">
    <button id="replay">▶ 다시 재생</button>
    <button id="clear" class="gray">지우고 다시</button>
    <label>속도 <input type="range" id="speed" min="800" max="5000" value="2300" step="100">
      <span id="spdval">2.3s</span></label>
  </div>
  <div class="row">
    <button id="export">📋 결과 복사 (이걸 채팅에 붙여넣기)</button>
  </div>
  <textarea id="out" placeholder="여기 나온 내용을 전부 복사해서 보내주세요"></textarea>
  <div id="status"></div>

<script>
(function() {
  var board = document.getElementById('board');
  var drawn = document.getElementById('drawn');
  var trace = document.getElementById('trace');
  var status = document.getElementById('status');
  var strokes = [];      // [[ [x,y], ... ], ...]
  var current = null;
  var drawing = false;
  var animId = null;

  function pt(e) {
    var r = board.getBoundingClientRect();
    var x = (e.clientX - r.left) * 512 / r.width;
    var y = (e.clientY - r.top) * 512 / r.height;
    return [Math.round(x), Math.round(y)];
  }
  function tracePath() {
    var d = '';
    strokes.concat(current ? [current] : []).forEach(function(s) {
      if (s.length > 0) d += 'M ' + s.map(function(p){return p[0]+','+p[1];}).join(' L ') + ' ';
    });
    trace.setAttribute('d', d);
  }
  board.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    stopAnim();
    drawing = true; current = [pt(e)];
    board.setPointerCapture(e.pointerId);
  });
  board.addEventListener('pointermove', function(e) {
    if (!drawing) return;
    var p = pt(e), last = current[current.length-1];
    var dx = p[0]-last[0], dy = p[1]-last[1];
    if (dx*dx + dy*dy >= 16) { current.push(p); tracePath(); }
  });
  board.addEventListener('pointerup', function(e) {
    if (!drawing) return;
    drawing = false;
    if (current.length > 2) strokes.push(current);
    current = null;
    tracePath();
    play();
  });

  function buildPath() {
    var d = '';
    strokes.forEach(function(s) {
      d += 'M ' + s.map(function(p){return p[0]+','+p[1];}).join(' L ') + ' ';
    });
    return d.trim();
  }
  function stopAnim() { if (animId) { cancelAnimationFrame(animId); animId = null; } }
  function play() {
    stopAnim();
    if (!strokes.length) return;
    drawn.setAttribute('d', buildPath());
    var L = drawn.getTotalLength();
    drawn.setAttribute('stroke-dasharray', L + ' ' + (2*L));
    var dur = parseInt(document.getElementById('speed').value);
    var t0 = null;
    function step(now) {
      if (t0 === null) t0 = now;
      var k = Math.min(1, (now - t0) / dur);
      drawn.setAttribute('stroke-dashoffset', String(k === 0 ? L+1 : L*(1-k)));
      if (k < 1) animId = requestAnimationFrame(step);
      else { status.textContent = '재생 완료 — 마음에 들면 아래 복사 버튼!'; animId = null; }
    }
    status.textContent = '재생 중...';
    animId = requestAnimationFrame(step);
  }
  document.getElementById('replay').onclick = play;
  document.getElementById('clear').onclick = function() {
    stopAnim(); strokes = []; current = null;
    drawn.removeAttribute('d'); trace.removeAttribute('d');
    document.getElementById('out').value = ''; status.textContent = '';
  };
  var spd = document.getElementById('speed');
  spd.oninput = function() {
    document.getElementById('spdval').textContent = (spd.value/1000).toFixed(1) + 's';
  };
  document.getElementById('export').onclick = function() {
    var data = JSON.stringify({ duration: parseInt(spd.value), strokes: strokes });
    var out = document.getElementById('out');
    out.value = data;
    out.select();
    try { document.execCommand('copy'); status.textContent = '복사됐어요! 채팅에 붙여넣어 주세요.'; }
    catch(e) { status.textContent = '자동 복사 실패 — 텍스트를 직접 전체선택해서 복사해주세요.'; }
  };
})();
</script>
</body>
</html>
